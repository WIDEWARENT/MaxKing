<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXKING</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }
        button {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            margin: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .balance {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            padding: 20px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="balance">
        <div>ТВОЙ БАЛАНС</div>
        <div><span id="balance">0</span> USDT</div>
    </div>
    
    <button onclick="sendAction('sell')">🎮 Сдать Max</button>
    <button onclick="sendAction('queue')">📋 Очередь</button>
    <button onclick="sendAction('balance')">💰 Баланс</button>
    <button onclick="sendAction('withdraw')">💸 Вывести</button>
    <button onclick="sendAction('referrals')">👥 Рефералы</button>
    <button onclick="sendAction('top')">🏆 ТОП</button>
    <button onclick="sendAction('support')">💬 Поддержка</button>
    <button onclick="closeApp()">❌ Закрыть</button>

    <div id="toast" class="toast"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        function showToast(msg) {
            let toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
        
        function sendAction(action) {
            console.log("Отправка: " + action);
            showToast("📤 Отправлено: " + action);
            tg.sendData(JSON.stringify({ action: action }));
            // НЕ ЗАКРЫВАЕМ ПРИЛОЖЕНИЕ
        }
        
        function closeApp() {
            tg.close();
        }
        
        tg.MainButton.setText("🔄 ОБНОВИТЬ");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            tg.sendData(JSON.stringify({ action: 'update' }));
        });
    </script>
</body>
</html>
